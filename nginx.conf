user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting zones (supplement app-level limiting)
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── Upstream ────────────────────────────────────────────────────────────────
    upstream api_backend {
        server app:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS + WebSocket ───────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name your-domain.com;  # ← UPDATE THIS

        ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ── WebSocket upgrade ──────────────────────────────────────────────────
        location /ws/ {
            proxy_pass          http://api_backend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_read_timeout  86400;  # 24h — keep WS alive
            proxy_send_timeout  86400;
        }

        # ── Auth endpoints (stricter rate limit) ───────────────────────────────
        location ~ ^/api/v1/auth/(register|login) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass          http://api_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
        }

        # ── Stripe webhook (no rate limit — signed by Stripe) ──────────────────
        location /api/v1/webhooks/stripe {
            proxy_pass          http://api_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            client_body_buffer_size 64k;
            client_max_body_size    64k;
        }

        # ── General API ────────────────────────────────────────────────────────
        location / {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;

            proxy_pass          http://api_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_read_timeout  30s;
            proxy_connect_timeout 5s;
        }

        # OpenAPI docs only in non-prod or when authenticated
        location ~ ^/(docs|redoc|openapi.json)$ {
            proxy_pass          http://api_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_set_header    Host $host;
        }
    }
}
